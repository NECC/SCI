_format_version: "1.1"

services:
  - name: rest
    url: http://rest:3000
    routes:
      - name: rest
        strip_path: true
        paths:
          - /
    plugins:
      - name: cors
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: request-transformer
        config:
          add:
            headers:
              - "Authorization:Bearer $request.header.apikey"

  - name: auth-v1
    url: http://auth:9999
    routes:
      - name: auth-v1
        strip_path: true
        paths:
          - /auth/v1
    plugins:
      - name: cors

  - name: storage-v1
    url: http://storage:8000
    routes:
      - name: storage-v1
        strip_path: true
        paths:
          - /storage/v1
    plugins:
      - name: cors
      - name: key-auth
        config:
          key_names:
            - apikey

  - name: meta
    url: http://meta:8080
    routes:
      - name: meta
        strip_path: true
        paths:
          - /pg
    plugins:
      - name: cors
      - name: key-auth
        config:
          key_names:
            - apikey

  - name: realtime-v1
    url: http://realtime:4000/socket
    routes:
      - name: realtime-v1
        strip_path: true
        paths:
          - /realtime/v1
    plugins:
      - name: cors
      - name: key-auth
        config:
          key_names:
            - apikey

